<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 16px;
                font-family: sans-serif;
                user-select: none;
            }

            .controls-row {
                display: flex;
                gap: 16px;
            }

            .scroll-zone {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 8px;
                width: 160px;
                height: 160px;
                border: 2px solid #34495e;
                border-radius: 12px;
                background: #f0f3f4;
                cursor: ns-resize;
                touch-action: none;
            }

            .scroll-zone .label {
                font-size: 18px;
                color: #555;
            }

            .scroll-zone .value {
                font-size: 28px;
                font-weight: bold;
                color: #2c3e50;
            }

            .scroll-zone .hint {
                font-size: 22px;
                color: #aaa;
            }

            .start-stop-btn {
                font-size: 32px;
                padding: 16px 48px;
                border: none;
                border-radius: 12px;
                background: #27ae60;
                color: white;
                cursor: pointer;
                min-width: 220px;
            }

            .start-stop-btn.active {
                background: #e74c3c;
            }
        </style>
        <script>
            let intervalMs = 4000;
            let secondIntervalMs = 5000;
            let isPlaying = false;
            let progressTimerId = null;
            let progressStartTime = null;
            let progressDurationMs = 0;

            const beepSound = new Audio('beep.mp3');

            function onKeyPress(event) {
                switch (event.key) {
                    case "ArrowDown":
                        adjustInterval(-100);
                        break;
                    case "ArrowUp":
                        adjustInterval(100);
                        break;
                    case "ArrowLeft":
                        adjustSecondInterval(-500);
                        break;
                    case "ArrowRight":
                        adjustSecondInterval(500);
                        break;
                    case "Enter":
                        startPlaying();
                        break;
                    case " ":
                    case "Escape":
                        stopPlaying();
                        break;
                    default:
                        return;
                }
            }

            function adjustInterval(delta) {
                intervalMs = Math.max(100, intervalMs + delta);
                displayInterval();
            }

            function adjustSecondInterval(delta) {
                secondIntervalMs = Math.max(500, secondIntervalMs + delta);
                displayInterval();
            }

            function startPlaying() {
                isPlaying = true;
                displayInterval();
            }

            function stopPlaying() {
                isPlaying = false;
                stopProgressBar();
                displayInterval();
            }

            function togglePlaying() {
                if (isPlaying) stopPlaying();
                else startPlaying();
            }

            async function draw() {
                displayInterval();
                renderProgressBar(0);
                initTouchControls();

                while (true) {
                    if (!isPlaying) { await sleep(1000); }

                    if (isPlaying) { await sleep(secondIntervalMs); }
                    if (isPlaying) {
                        resetProgressBar();
                        playBeep();
                        startProgressBar(intervalMs);
                    }

                    if (isPlaying) {
                        await sleep(intervalMs);
                    }

                    if (isPlaying) {
                        stopProgressBar(true);
                        await playBeepAndWait();
                        renderProgressBar(0);
                    }
                }
            }

            function initTouchControls() {
                const intervalZone = document.getElementById('intervalZone');
                const secondZone = document.getElementById('secondZone');
                let touchStartY = null;
                let activeZone = null;

                intervalZone.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    adjustInterval(e.deltaY > 0 ? -100 : 100);
                }, { passive: false });

                secondZone.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    adjustSecondInterval(e.deltaY > 0 ? -500 : 500);
                }, { passive: false });

                [intervalZone, secondZone].forEach(zone => {
                    zone.addEventListener('touchstart', (e) => {
                        touchStartY = e.touches[0].clientY;
                        activeZone = zone.id;
                    }, { passive: true });

                    zone.addEventListener('touchmove', (e) => {
                        e.preventDefault();
                        if (touchStartY === null) return;
                        const deltaY = touchStartY - e.touches[0].clientY;
                        if (Math.abs(deltaY) >= 15) {
                            if (activeZone === 'intervalZone') adjustInterval(deltaY > 0 ? 100 : -100);
                            else adjustSecondInterval(deltaY > 0 ? 500 : -500);
                            touchStartY = e.touches[0].clientY;
                        }
                    }, { passive: false });

                    zone.addEventListener('touchend', () => {
                        touchStartY = null;
                        activeZone = null;
                    });
                });
            }

            function playBeep() {
                beepSound.play();
            }

            function playBeepAndWait() {
                return new Promise(resolve => {
                    beepSound.addEventListener('ended', resolve, { once: true });
                    beepSound.play().catch(resolve);
                });
            }

            function displayInterval() {
                const intervalSpan = document.getElementById("intervalSpan");
                intervalSpan.textContent = `Sound is ${isPlaying ? "ON" : "OFF"}.`;

                const intervalVal = document.getElementById("intervalVal");
                if (intervalVal) intervalVal.textContent = `${intervalMs} ms`;

                const secondVal = document.getElementById("secondVal");
                if (secondVal) secondVal.textContent = `${secondIntervalMs} ms`;

                const btn = document.getElementById("startStopBtn");
                if (btn) {
                    btn.textContent = isPlaying ? "Stop" : "Start";
                    btn.classList.toggle("active", isPlaying);
                }
            }

            function startProgressBar(durationMs) {
                progressDurationMs = Math.max(durationMs, 0);
                progressStartTime = performance.now();

                if (progressDurationMs === 0) {
                    renderProgressBar(1);
                    return;
                }

                if (progressTimerId !== null) {
                    clearInterval(progressTimerId);
                }

                const updateProgress = () => {
                    if (!isPlaying || progressStartTime === null) {
                        return;
                    }

                    const elapsedMs = performance.now() - progressStartTime;
                    const progress = Math.min(elapsedMs / progressDurationMs, 1);

                    renderProgressBar(progress);

                    if (progress >= 1) {
                        clearInterval(progressTimerId);
                        progressTimerId = null;
                        progressStartTime = null;
                        progressDurationMs = 0;
                    }
                };

                renderProgressBar(0);
                updateProgress();
                progressTimerId = setInterval(updateProgress, 200);
            }

            function stopProgressBar(fillCompleted = false) {
                if (progressTimerId !== null) {
                    clearInterval(progressTimerId);
                    progressTimerId = null;
                }

                progressStartTime = null;
                progressDurationMs = 0;
                renderProgressBar(fillCompleted ? 1 : 0);
            }

            function resetProgressBar() {
                stopProgressBar(false);
            }

            function renderProgressBar(progress) {
                const progressBar = document.getElementById("progressBar");
                const clampedProgress = Math.max(0, Math.min(progress, 1));
                const completedPercent = `${clampedProgress * 100}%`;

                progressBar.style.background = `linear-gradient(to right, #e67e22 0%, #e67e22 ${completedPercent}, #d5dbdb ${completedPercent}, #d5dbdb 100%)`;
            }

            function sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
        </script>
    </head>
    <body onload="draw();" onkeydown="onKeyPress(event)">
        <span id="intervalSpan" style="font-size: 36px; text-align: center;"></span>
        <div class="controls-row">
            <div id="intervalZone" class="scroll-zone">
                <span class="label">Shot interval</span>
                <span id="intervalVal" class="value">4000 ms</span>
                <span class="hint">↕</span>
            </div>
            <div id="secondZone" class="scroll-zone">
                <span class="label">Delay</span>
                <span id="secondVal" class="value">5000 ms</span>
                <span class="hint">↕</span>
            </div>
        </div>
        <button id="startStopBtn" class="start-stop-btn" onclick="togglePlaying()">Start</button>
        <span id="progressBar" style="display: block; width: min(700px, 80vw); height: 32px; border: 2px solid #34495e; border-radius: 4px; background: linear-gradient(to right, #e67e22 0%, #e67e22 0%, #d5dbdb 0%, #d5dbdb 100%);"></span>
        <span id="helpSpan" style="font-size: 20px; text-align: center; color: #666;">Scroll/swipe zones to tune &bull; Arrows &amp; Enter on keyboard</span>
    </body>
</html>
